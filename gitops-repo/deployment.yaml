apiVersion: apps/v1
kind: Deployment

metadata:
  name: myapp

spec:
  replicas: 2

  selector:
    matchLabels:
      app: myapp

  template:
    metadata:
      labels:
        app: myapp

    spec:
      containers:
      - name: myapp
        image: mohammedsulaimana9/myapp:004b73c2ab0e7a77b359878988bf3033813bfb92
        ports:
        - containerPort: 5000